<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3748;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a202c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#667eea" text-anchor="middle">NexusClaw - Arquitetura do Sistema</text>

  <!-- Main Core Box -->
  <rect x="250" y="70" width="300" height="200" rx="10" fill="url(#cardGrad)" stroke="#667eea" stroke-width="2"/>
  <text x="400" y="100" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">NEXUSCLAW CORE</text>

  <!-- Brain/Agent -->
  <rect x="270" y="115" width="120" height="60" rx="5" fill="#4a5568" stroke="#667eea" stroke-width="1"/>
  <text x="330" y="140" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">AGENTE</text>
  <text x="330" y="160" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">(Brain)</text>

  <!-- Memory -->
  <rect x="410" y="115" width="120" height="60" rx="5" fill="#4a5568" stroke="#48bb78" stroke-width="1"/>
  <text x="470" y="140" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">MEMÓRIA</text>
  <text x="470" y="160" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">(Vectors)</text>

  <!-- Orchestrator -->
  <rect x="310" y="195" width="180" height="60" rx="5" fill="#4a5568" stroke="#ed8936" stroke-width="1"/>
  <text x="400" y="220" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">ORQUESTRADOR</text>
  <text x="400" y="240" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">(Tasks)</text>

  <!-- Skills System -->
  <rect x="100" y="70" width="130" height="200" rx="10" fill="url(#cardGrad)" stroke="#48bb78" stroke-width="2"/>
  <text x="165" y="100" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#48bb78" text-anchor="middle">HABILIDADES</text>

  <!-- Skills Icons -->
  <circle cx="130" cy="130" r="15" fill="#667eea"/>
  <text x="130" y="135" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">🔍</text>
  <text x="165" y="135" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">Search</text>

  <circle cx="130" cy="160" r="15" fill="#48bb78"/>
  <text x="130" y="165" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">📁</text>
  <text x="165" y="165" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">Files</text>

  <circle cx="130" cy="190" r="15" fill="#ed8936"/>
  <text x="130" y="195" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">⏰</text>
  <text x="165" y="195" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">Schedule</text>

  <circle cx="130" cy="220" r="15" fill="#f56565"/>
  <text x="130" y="225" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">💻</text>
  <text x="165" y="225" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">Code</text>

  <circle cx="130" cy="250" r="15" fill="#9f7aea"/>
  <text x="130" y="255" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">📡</text>
  <text x="165" y="255" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">+ Extensível</text>

  <!-- Communication Channels -->
  <rect x="570" y="70" width="130" height="200" rx="10" fill="url(#cardGrad)" stroke="#ed8936" stroke-width="2"/>
  <text x="635" y="100" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ed8936" text-anchor="middle">CANAIS</text>

  <!-- Channel Icons -->
  <circle cx="600" cy="130" r="15" fill="#667eea"/>
  <text x="600" y="135" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">📱</text>
  <text x="660" y="135" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">Telegram</text>

  <circle cx="600" cy="160" r="15" fill="#5865F2"/>
  <text x="600" y="165" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">🎮</text>
  <text x="660" y="165" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">Discord</text>

  <circle cx="600" cy="190" r="15" fill="#48bb78"/>
  <text x="600" y="195" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">💻</text>
  <text x="660" y="195" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">CLI</text>

  <circle cx="600" cy="220" r="15" fill="#ed8936"/>
  <text x="600" y="225" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">🌐</text>
  <text x="660" y="225" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">Web API</text>

  <circle cx="600" cy="250" r="15" fill="#f56565"/>
  <text x="600" y="255" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">📞</text>
  <text x="660" y="255" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">WhatsApp</text>

  <!-- Connection Lines -->
  <line x1="230" y1="170" x2="270" y2="145" stroke="#667eea" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="530" y1="145" x2="570" y2="145" stroke="#ed8936" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="400" y1="270" x2="400" y2="290" stroke="#667eea" stroke-width="2"/>

  <!-- Deep Thinking Module -->
  <rect x="50" y="310" width="200" height="120" rx="10" fill="url(#cardGrad)" stroke="#9f7aea" stroke-width="2" filter="url(#glow)"/>
  <text x="150" y="340" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#9f7aea" text-anchor="middle">🧠 PENSAMENTO</text>
  <text x="150" y="360" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#9f7aea" text-anchor="middle">PROFUNDO</text>
  <text x="150" y="385" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">• Cadeia de Pensamento</text>
  <text x="150" y="400" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">• Auto-Reflexão</text>
  <text x="150" y="415" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">• Planejamento Autônomo</text>

  <!-- Self-Improvement Module -->
  <rect x="300" y="310" width="200" height="120" rx="10" fill="url(#cardGrad)" stroke="#48bb78" stroke-width="2"/>
  <text x="400" y="340" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#48bb78" text-anchor="middle">🔄 AUTO-</text>
  <text x="400" y="360" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#48bb78" text-anchor="middle">APERFEIÇOAMENTO</text>
  <text x="400" y="385" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">• Feedback Contínuo</text>
  <text x="400" y="400" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">• Métricas de Performance</text>
  <text x="400" y="415" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">• Evolução Automática</text>

  <!-- Code Evolution Module -->
  <rect x="550" y="310" width="200" height="120" rx="10" fill="url(#cardGrad)" stroke="#ed8936" stroke-width="2"/>
  <text x="650" y="340" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ed8936" text-anchor="middle">💻 EVOLUÇÃO</text>
  <text x="650" y="360" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ed8936" text-anchor="middle">DE CÓDIGO</text>
  <text x="650" y="385" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">• Análise de Código</text>
  <text x="650" y="400" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">• Sugestão de Features</text>
  <text x="650" y="415" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">• Recomendações Técnicas</text>

  <!-- Database Layer -->
  <rect x="50" y="460" width="700" height="100" rx="10" fill="url(#cardGrad)" stroke="#4a5568" stroke-width="2"/>
  <text x="400" y="490" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">CAMADA DE DADOS</text>

  <!-- Databases -->
  <rect x="80" y="505" width="120" height="40" rx="5" fill="#2d3748" stroke="#667eea" stroke-width="1"/>
  <text x="140" y="530" font-family="Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle">PostgreSQL</text>

  <rect x="220" y="505" width="120" height="40" rx="5" fill="#2d3748" stroke="#48bb78" stroke-width="1"/>
  <text x="280" y="530" font-family="Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle">Qdrant</text>

  <rect x="360" y="505" width="80" height="40" rx="5" fill="#2d3748" stroke="#ed8936" stroke-width="1"/>
  <text x="400" y="530" font-family="Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle">Redis</text>

  <rect x="460" y="505" width="120" height="40" rx="5" fill="#2d3748" stroke="#9f7aea" stroke-width="1"/>
  <text x="520" y="530" font-family="Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle">Ollama (LLM)</text>

  <rect x="600" y="505" width="120" height="40" rx="5" fill="#2d3748" stroke="#f56565" stroke-width="1"/>
  <text x="660" y="530" font-family="Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle">Filesystem</text>

  <!-- Version -->
  <text x="750" y="590" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="end">NexusClaw v1.0.0</text>
</svg>