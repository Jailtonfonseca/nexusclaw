# NexusClaw - Otimizado para Orange Pi 3B (8GB RAM)
# Versão leve para hardware limitado

version: '3.8'

services:
  # Core API do NexusClaw (versão otimizada)
  nexus-ai:
    build: 
      context: .
      dockerfile: Dockerfile.arm64
    container_name: nexus-ai
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./skills:/app/skills
      - ./config:/app/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      # Banco de dados SQLite (mais leve que PostgreSQL)
      - DATABASE_URL=sqlite:////app/data/nexus.db
      
      # Redis para cache (usar memória limitada)
      - REDIS_URL=redis://redis:6379
      
      # Ollama local (ARM64)
      - OLLAMA_BASE_URL=http://ollama:11434
      
      # Qdrant para vetores (alternativa leve)
      - QDRANT_HOST=qdrant
      
      # Configurações de memória
      - MAX_WORKERS=2
      - OLLAMA_NUM_THREADS=4
      - OLLAMA_FLASH_ATTENTION=0
      
      # Modelos recomendados para Orange Pi
      - OLLAMA_MODEL=phi3:mini
      - EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
    depends_on:
      - redis
      - ollama
      - qdrant
    restart: unless-stopped
    networks:
      - nexus-network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
          cpus: '2.0'

  # Cache leve (Redis)
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - nexus-network
    deploy:
      resources:
        limits:
          memory: 512M

  # LLM Local (Ollama ARM64)
  ollama:
    image: ollama/ollama:latest
    container_name: nexus-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      # Limitar uso de memória
      - OLLAMA_MODELS=/root/.ollama/models
    restart: unless-stopped
    networks:
      - nexus-network
    deploy:
      resources:
        limits:
          memory: 4G

  # Banco de vetores leve (Qdrant)
  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: nexus-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      - QDRANT_STORAGE__RAM__ACCESS__ENABLED=true
      - QDRANT_STORAGE__DISK__ENABLED=false
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped
    networks:
      - nexus-network
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  redis-data:
  ollama-data:
  qdrant-data:

networks:
  nexus-network:
    driver: bridge
